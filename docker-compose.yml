# =============================================================================
# KGOS X 2031 — DOCKER COMPOSE CONFIGURATION
# =============================================================================

version: '3.8'

services:
  # 1. Main Next.js 16 SaaS Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kgos_web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kgos?schema=public
      - DIRECT_URL=postgresql://postgres:postgres@postgres:5432/kgos?schema=public
      - NEXT_PUBLIC_SUPABASE_URL=https://afdpdqxfarwshdqtvvba.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - neo4j
    restart: always

  # 2. Local PostgreSQL Database (Alternative for local execution)
  postgres:
    image: postgres:15-alpine
    container_name: kgos_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kgos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 3. Local Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: kgos_neo4j
    ports:
      - "7474:7474" # HTTP Connector
      - "7687:7687" # Bolt Connector
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: always

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
